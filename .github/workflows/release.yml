name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build icons if source exists
        run: |
          if [ -f build/icon-source.svg ]; then
            chmod +x build/make-icons.sh
            ./build/make-icons.sh
          fi

      - name: Build macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi

          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"

          if [[ -f "dist/${CHANNEL_NAME}.yml" && ! -f "dist/latest.yml" ]]; then
            cp "dist/${CHANNEL_NAME}.yml" "dist/latest.yml"
          fi

          if [[ -f "dist/${CHANNEL_NAME}-mac.yml" && ! -f "dist/latest-mac.yml" ]]; then
            cp "dist/${CHANNEL_NAME}-mac.yml" "dist/latest-mac.yml"
          fi

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 == "## v" version { capture=1; next }
            /^## v/ && capture { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "- No changelog text was captured for this release." >> release-notes.md
          fi

      - name: Upload macOS artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi

          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"

          if [[ -f "dist/${CHANNEL_NAME}.yml" && ! -f "dist/latest.yml" ]]; then
            cp "dist/${CHANNEL_NAME}.yml" "dist/latest.yml"
          fi

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 == "## v" version { capture=1; next }
            /^## v/ && capture { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "- No changelog text was captured for this release." >> release-notes.md
          fi

      - name: Upload Windows artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
