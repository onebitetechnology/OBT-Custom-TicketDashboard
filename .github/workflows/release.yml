name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build icons if source exists
        run: |
          if [ -f build/icon-source.svg ]; then
            chmod +x build/make-icons.sh
            ./build/make-icons.sh
          fi

      - name: Build macOS release
        run: npx electron-builder --mac dmg zip --publish never

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi

          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"

          if [[ -f "dist/${CHANNEL_NAME}-mac.yml" && ! -f "dist/latest-mac.yml" ]]; then
            cp "dist/${CHANNEL_NAME}-mac.yml" "dist/latest-mac.yml"
          fi

          if [[ ! -f "dist/latest-mac.yml" ]]; then
            FALLBACK_MAC_YML="$(find dist -maxdepth 1 -type f -name '*-mac.yml' ! -name 'latest-mac.yml' | head -n 1)"
            if [[ -n "$FALLBACK_MAC_YML" ]]; then
              cp "$FALLBACK_MAC_YML" "dist/latest-mac.yml"
            fi
          fi

          echo "macOS updater metadata:"
          ls -1 dist/*.yml 2>/dev/null || true

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
            dist/*.blockmap

      - name: Verify macOS updater metadata
        shell: bash
        run: |
          if [[ ! -f "dist/latest-mac.yml" ]]; then
            echo "Missing macOS updater metadata after compatibility step."
            ls -la dist || true
            exit 1
          fi

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npx electron-builder --win nsis --publish never

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi

          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"

          if [[ -f "dist/${CHANNEL_NAME}.yml" && ! -f "dist/latest.yml" ]]; then
            cp "dist/${CHANNEL_NAME}.yml" "dist/latest.yml"
          fi

          if [[ ! -f "dist/latest.yml" ]]; then
            FALLBACK_YML="$(find dist -maxdepth 1 -type f -name '*.yml' ! -name 'latest.yml' ! -name 'latest-mac.yml' ! -name 'builder-debug.yml' | head -n 1)"
            if [[ -n "$FALLBACK_YML" ]]; then
              cp "$FALLBACK_YML" "dist/latest.yml"
            fi
          fi

          echo "Windows updater metadata:"
          ls -1 dist/*.yml 2>/dev/null || true

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.yml
            dist/*.blockmap

      - name: Verify Windows updater metadata
        shell: bash
        run: |
          if [[ ! -f "dist/latest.yml" ]]; then
            echo "Missing Windows updater metadata after compatibility step."
            ls -la dist || true
            exit 1
          fi

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS workflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release-artifacts
          path: dist

      - name: Download Windows workflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-artifacts
          path: dist

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 == "## v" version { capture=1; next }
            /^## v/ && capture { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "- No changelog text was captured for this release." >> release-notes.md
          fi

      - name: Verify release assets before publish
        shell: bash
        run: |
          if [[ ! -f "dist/latest.yml" ]]; then
            echo "Missing dist/latest.yml in publish job."
            ls -la dist || true
            exit 1
          fi
          if [[ ! -f "dist/latest-mac.yml" ]]; then
            echo "Missing dist/latest-mac.yml in publish job."
            ls -la dist || true
            exit 1
          fi

      - name: Publish release with GitHub CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          RELEASE_ID="$(gh release view "$TAG" --json databaseId --jq '.databaseId' 2>/dev/null || true)"
          if [[ -z "$RELEASE_ID" ]]; then
            gh release create "$TAG" $PRERELEASE_FLAG --title "$TAG" --notes-file release-notes.md
          else
            gh release edit "$TAG" $PRERELEASE_FLAG --title "$TAG" --notes-file release-notes.md
          fi

          gh release upload "$TAG" \
            dist/*.exe \
            dist/*.dmg \
            dist/*.zip \
            dist/latest.yml \
            dist/latest-mac.yml \
            dist/*.blockmap \
            --clobber
