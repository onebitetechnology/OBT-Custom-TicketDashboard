name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to rebuild, such as v3.0.0-beta.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag and package version
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "Release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$VERSION" != "$RELEASE_TAG" ]]; then
            echo "package.json version v$VERSION does not match $RELEASE_TAG"
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$(git rev-list -n 1 "$RELEASE_TAG")" ]]; then
            echo "Checkout does not match the requested release tag."
            exit 1
          fi
          if ! grep -Fq "## $RELEASE_TAG" CHANGELOG.md; then
            echo "CHANGELOG.md has no section for $RELEASE_TAG"
            exit 1
          fi

  verify-source:
    runs-on: ubuntu-latest
    needs: validate-release
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run release preflight
        run: bash ./preflight.sh

  build-macos:
    runs-on: macos-latest
    needs: verify-source
    timeout-minutes: 45
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Require macOS signing and notarization secrets
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install locked dependencies
        run: npm ci

      - name: Build icons if source exists
        shell: bash
        run: |
          if [[ -f build/icon-source.svg ]]; then
            chmod +x build/make-icons.sh
            ./build/make-icons.sh
          fi

      - name: Build, sign, and notarize macOS release
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac dmg zip --publish never

      - name: Verify hardened Electron fuses
        shell: bash
        run: |
          APP_PATH="$(find dist -type d -name '*.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "Packaged macOS app was not found."
            exit 1
          fi
          npm run verify:fuses -- "$APP_PATH"

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi
          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"
          if [[ -f "dist/${CHANNEL_NAME}-mac.yml" && ! -f "dist/latest-mac.yml" ]]; then
            cp "dist/${CHANNEL_NAME}-mac.yml" "dist/latest-mac.yml"
          fi
          if [[ ! -f "dist/latest-mac.yml" ]]; then
            FALLBACK_MAC_YML="$(find dist -maxdepth 1 -type f -name '*-mac.yml' ! -name 'latest-mac.yml' | head -n 1)"
            if [[ -n "$FALLBACK_MAC_YML" ]]; then
              cp "$FALLBACK_MAC_YML" "dist/latest-mac.yml"
            fi
          fi

      - name: Verify macOS signature and notarization
        shell: bash
        run: |
          APP_PATH="$(find dist -type d -name '*.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "Packaged macOS app was not found."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          SIGNATURE="$(codesign --display --verbose=4 "$APP_PATH" 2>&1)"
          if ! grep -Fq 'Authority=Developer ID Application:' <<< "$SIGNATURE"; then
            echo "The macOS app is not signed with a Developer ID Application certificate."
            exit 1
          fi
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Verify macOS updater metadata
        shell: bash
        run: |
          if [[ ! -f dist/latest-mac.yml ]]; then
            echo "Missing macOS updater metadata after compatibility step."
            ls -la dist || true
            exit 1
          fi

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-release-artifacts
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
            dist/*.blockmap

  build-windows:
    runs-on: windows-latest
    needs: verify-source
    timeout-minutes: 45
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Require Windows signing secrets
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) { throw 'Missing required GitHub secret: WIN_CSC_LINK' }
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) { throw 'Missing required GitHub secret: WIN_CSC_KEY_PASSWORD' }

      - name: Install locked dependencies
        run: npm ci

      - name: Build and sign Windows release
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win nsis --publish never

      - name: Verify hardened Electron fuses
        shell: pwsh
        run: |
          $appExecutable = Get-ChildItem -Path dist -Recurse -Filter 'One Bite Ticket Display.exe' -File | Select-Object -First 1
          if ($null -eq $appExecutable) { throw 'Packaged Windows app executable was not found.' }
          npm run verify:fuses -- "$($appExecutable.FullName)"

      - name: Add updater compatibility metadata
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" != *-* ]]; then
            exit 0
          fi
          CHANNEL_SUFFIX="${VERSION#*-}"
          CHANNEL_NAME="${CHANNEL_SUFFIX%%.*}"
          if [[ -f "dist/${CHANNEL_NAME}.yml" && ! -f "dist/latest.yml" ]]; then
            cp "dist/${CHANNEL_NAME}.yml" "dist/latest.yml"
          fi
          if [[ ! -f "dist/latest.yml" ]]; then
            FALLBACK_YML="$(find dist -maxdepth 1 -type f -name '*.yml' ! -name 'latest.yml' ! -name 'latest-mac.yml' ! -name 'builder-debug.yml' | head -n 1)"
            if [[ -n "$FALLBACK_YML" ]]; then
              cp "$FALLBACK_YML" "dist/latest.yml"
            fi
          fi

      - name: Verify Windows Authenticode signature
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -Path dist -Filter '*-Setup.exe' -File)
          if ($installers.Count -ne 1) { throw "Expected one Windows installer, found $($installers.Count)." }
          $signature = Get-AuthenticodeSignature -FilePath $installers[0].FullName
          if ($signature.Status -ne 'Valid') { throw "Windows installer signature is $($signature.Status): $($signature.StatusMessage)" }
          if ([string]::IsNullOrWhiteSpace($signature.SignerCertificate.Subject)) { throw 'Windows installer has no signer certificate subject.' }
          Write-Host "Verified signer: $($signature.SignerCertificate.Subject)"

      - name: Verify Windows updater metadata
        shell: bash
        run: |
          if [[ ! -f dist/latest.yml ]]; then
            echo "Missing Windows updater metadata after compatibility step."
            ls -la dist || true
            exit 1
          fi

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-release-artifacts
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Download macOS workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-release-artifacts
          path: dist

      - name: Download Windows workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-release-artifacts
          path: dist

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          awk -v version="$VERSION" '
            $0 == "## v" version { capture=1; next }
            /^## v/ && capture { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
            echo >> release-notes.md
            echo "- No changelog text was captured for this release." >> release-notes.md
          fi

      - name: Verify release assets before publish
        shell: bash
        run: |
          shopt -s nullglob
          windows=(dist/*-Setup.exe)
          mac_dmg=(dist/*.dmg)
          mac_zip=(dist/*.zip)
          if (( ${#windows[@]} != 1 || ${#mac_dmg[@]} < 1 || ${#mac_zip[@]} < 1 )); then
            echo "Expected signed Windows, macOS DMG, and macOS ZIP artifacts."
            find dist -maxdepth 1 -type f -print
            exit 1
          fi
          [[ -f dist/latest.yml ]] || { echo 'Missing dist/latest.yml'; exit 1; }
          [[ -f dist/latest-mac.yml ]] || { echo 'Missing dist/latest-mac.yml'; exit 1; }

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          files=(*.exe *.dmg *.zip *.yml *.blockmap)
          printf '%s\0' "${files[@]}" | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          test -s SHA256SUMS.txt

      - name: Attest release build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
            dist/SHA256SUMS.txt

      - name: Publish release with GitHub CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_ID="$(gh release view "$RELEASE_TAG" --json databaseId --jq '.databaseId' 2>/dev/null || true)"
          if [[ -z "$RELEASE_ID" ]]; then
            gh release create "$RELEASE_TAG" $PRERELEASE_FLAG --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release edit "$RELEASE_TAG" $PRERELEASE_FLAG --title "$RELEASE_TAG" --notes-file release-notes.md
          fi
          gh release upload "$RELEASE_TAG" \
            dist/*.exe \
            dist/*.dmg \
            dist/*.zip \
            dist/latest.yml \
            dist/latest-mac.yml \
            dist/*.blockmap \
            dist/SHA256SUMS.txt \
            --clobber
